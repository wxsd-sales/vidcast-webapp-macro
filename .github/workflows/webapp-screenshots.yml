name: Webapp Screenshots

on:
  push:
    paths:
      - "webapp/**"
  pull_request:
    paths:
      - "webapp/**"

jobs:
  screenshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Capture demo screenshots
        run: npm run screenshot:web

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: webapp-screenshots
          path: screenshots/
